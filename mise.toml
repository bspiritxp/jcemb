[tasks.build-macos]
description = "Build macOS binaries (amd64 & arm64)"
run = [
  "GOOS=darwin GOARCH=amd64 go build -o dist/jcemb-darwin-amd64 .",
  "GOOS=darwin GOARCH=arm64 go build -o dist/jcemb-darwin-arm64 .",
]

[tasks.build-linux]
description = "Build Linux binaries (amd64 & arm64)"
run = [
  "GOOS=linux GOARCH=amd64 go build -o dist/jcemb-linux-amd64 .",
  "GOOS=linux GOARCH=arm64 go build -o dist/jcemb-linux-arm64 .",
]

[tasks.build-windows]
description = "Build Windows binaries (amd64 & arm64)"
run = [
  "GOOS=windows GOARCH=amd64 go build -o dist/jcemb-windows-amd64.exe .",
  "GOOS=windows GOARCH=arm64 go build -o dist/jcemb-windows-arm64.exe .",
]

[tasks.build-all]
description = "Build all platform binaries"
depends = ["build-macos", "build-linux", "build-windows"]
