name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build-release:
    name: Build release assets
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          mkdir -p dist packages

          binary_name="jcemb"
          archive_ext="tar.gz"
          if [ "$GOOS" = "windows" ]; then
            binary_name="jcemb.exe"
            archive_ext="zip"
          fi

          package_name="jcemb_${VERSION}_${GOOS}_${GOARCH}"
          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" .

          cp README.md LICENSE "${package_dir}/"

          if [ "$archive_ext" = "zip" ]; then
            (cd dist && zip -r "../packages/${package_name}.zip" "${package_name}")
          else
            tar -C dist -czf "packages/${package_name}.tar.gz" "${package_name}"
          fi

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcemb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: jcemb-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 * > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
