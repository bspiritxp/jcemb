name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build-release:
    name: Build release assets
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          mkdir -p dist packages

          binary_name="jcemb"
          archive_ext="tar.gz"
          if [ "$GOOS" = "windows" ]; then
            binary_name="jcemb.exe"
            archive_ext="zip"
          fi

          package_name="jcemb_${VERSION}_${GOOS}_${GOARCH}"
          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" .

          cp README.md LICENSE "${package_dir}/"

          if [ "$archive_ext" = "zip" ]; then
            (cd dist && zip -r "../packages/${package_name}.zip" "${package_name}")
          else
            tar -C dist -czf "packages/${package_name}.tar.gz" "${package_name}"
          fi

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcemb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: jcemb-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 * > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish-homebrew:
    name: Publish Homebrew tap formula
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Verify package repository token
        env:
          PACKAGE_REPO_TOKEN: ${{ secrets.PACKAGE_REPO_TOKEN }}
        run: |
          if [ -z "${PACKAGE_REPO_TOKEN}" ]; then
            echo "PACKAGE_REPO_TOKEN is required to publish to bspiritxp/homebrew-tap."
            exit 1
          fi

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: jcemb-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 * > SHA256SUMS

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: bspiritxp/homebrew-tap
          token: ${{ secrets.PACKAGE_REPO_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          base_url="https://github.com/bspiritxp/jcemb/releases/download/${tag}"
          checksums="${GITHUB_WORKSPACE}/release-assets/SHA256SUMS"

          sha_for() {
            awk -v file="$1" '$2 == file { print $1 }' "${checksums}"
          }

          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/jcemb.rb <<EOF
          class Jcemb < Formula
            desc "Local-first CLI for Markdown vector search"
            homepage "https://github.com/bspiritxp/jcemb"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${base_url}/jcemb_${tag}_darwin_arm64.tar.gz"
                sha256 "$(sha_for "jcemb_${tag}_darwin_arm64.tar.gz")"
              else
                url "${base_url}/jcemb_${tag}_darwin_amd64.tar.gz"
                sha256 "$(sha_for "jcemb_${tag}_darwin_amd64.tar.gz")"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${base_url}/jcemb_${tag}_linux_arm64.tar.gz"
                sha256 "$(sha_for "jcemb_${tag}_linux_arm64.tar.gz")"
              else
                url "${base_url}/jcemb_${tag}_linux_amd64.tar.gz"
                sha256 "$(sha_for "jcemb_${tag}_linux_amd64.tar.gz")"
              end
            end

            def install
              bin.install "jcemb"
            end

            test do
              system "#{bin}/jcemb", "--help"
            end
          end
          EOF

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/jcemb.rb; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi

          git add Formula/jcemb.rb
          git commit -m "Update jcemb to ${GITHUB_REF_NAME}"
          git push

  publish-scoop:
    name: Publish Scoop bucket manifest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Verify package repository token
        env:
          PACKAGE_REPO_TOKEN: ${{ secrets.PACKAGE_REPO_TOKEN }}
        run: |
          if [ -z "${PACKAGE_REPO_TOKEN}" ]; then
            echo "PACKAGE_REPO_TOKEN is required to publish to bspiritxp/scoop-bucket."
            exit 1
          fi

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: jcemb-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 * > SHA256SUMS

      - name: Check out Scoop bucket
        uses: actions/checkout@v4
        with:
          repository: bspiritxp/scoop-bucket
          token: ${{ secrets.PACKAGE_REPO_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          base_url="https://github.com/bspiritxp/jcemb/releases/download/${tag}"
          checksums="${GITHUB_WORKSPACE}/release-assets/SHA256SUMS"

          sha_for() {
            awk -v file="$1" '$2 == file { print $1 }' "${checksums}"
          }

          mkdir -p scoop-bucket/bucket
          cat > scoop-bucket/bucket/jcemb.json <<EOF
          {
              "version": "${version}",
              "description": "Local-first CLI for Markdown vector search",
              "homepage": "https://github.com/bspiritxp/jcemb",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "${base_url}/jcemb_${tag}_windows_amd64.zip",
                      "hash": "$(sha_for "jcemb_${tag}_windows_amd64.zip")",
                      "extract_dir": "jcemb_${tag}_windows_amd64"
                  },
                  "arm64": {
                      "url": "${base_url}/jcemb_${tag}_windows_arm64.zip",
                      "hash": "$(sha_for "jcemb_${tag}_windows_arm64.zip")",
                      "extract_dir": "jcemb_${tag}_windows_arm64"
                  }
              },
              "bin": "jcemb.exe",
              "checkver": {
                  "github": "https://github.com/bspiritxp/jcemb"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/bspiritxp/jcemb/releases/download/v\$version/jcemb_v\$version_windows_amd64.zip",
                          "extract_dir": "jcemb_v\$version_windows_amd64"
                      },
                      "arm64": {
                          "url": "https://github.com/bspiritxp/jcemb/releases/download/v\$version/jcemb_v\$version_windows_arm64.zip",
                          "extract_dir": "jcemb_v\$version_windows_arm64"
                      }
                  }
              }
          }
          EOF

      - name: Commit and push manifest
        working-directory: scoop-bucket
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- bucket/jcemb.json; then
            echo "Scoop manifest is already up to date."
            exit 0
          fi

          git add bucket/jcemb.json
          git commit -m "Update jcemb to ${GITHUB_REF_NAME}"
          git push
